<div id="mapContainer">
    <semantic-map-advanced
            id="search-map"
            year-filtering="true"
            cesium-asset-urls='http://92.223.159.139:8443/tiles/ifc/LZV/manifest.json'
            cesium-asset-temporal='{}'
            target-controls='["search-map-control"]'
            tiles-layers-query='
                PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
                PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
                PREFIX crm: <http://www.cidoc-crm.org/cidoc-crm/>
                PREFIX crmpc: <http://www.cidoc-crm.org/crmpc/>
                PREFIX veniss_ontology: <https://veniss.net/ontology#>

                SELECT ?url
                       (SAMPLE(COALESCE(STR(?source), "")) AS ?identifier)
                       (SAMPLE(COALESCE(?_name, "")) AS ?name)
                       (SAMPLE(COALESCE(?_level, "overlay")) AS ?level)
                       (SAMPLE(COALESCE(?_author, "")) AS ?author)
                       (SAMPLE(COALESCE(?_location, "")) AS ?location)
                       (SAMPLE(COALESCE(?_year, "")) AS ?year)
                       (SAMPLE(COALESCE(?_thumbnail, "")) AS ?thumbnail)
                WHERE {
                    ?source a veniss_ontology:Source ;
                            veniss_ontology:is_historical_map "true"^^xsd:boolean ;
                            veniss_ontology:historical_map_url ?url .

                    # Name from attributed title (English preferred)
                    OPTIONAL {
                      ?source crm:P1_is_identified_by ?appellation .
                      ?appellation a crm:E41_Appellation ;
                                   crm:P2_has_type <https://veniss.net/resource/type/attributed_title> ;
                                   rdfs:label ?_name .
                      FILTER(LANG(?_name) = "en" || LANG(?_name) = "")
                    }

                    # Author from production via PC14 role -> appellation label (Person or Group)
                    OPTIONAL {
                      ?source crm:P108i_was_produced_by ?production .
                      ?actorRole crmpc:P14.1_in_the_role_of <https://veniss.net/resource/vocab/actor_types/author> ;
                                 crmpc:P01_has_domain ?production ;
                                 crmpc:P02_has_range ?authorEntity .
                      ?authorEntity crm:P1_is_identified_by ?authorApp .
                      ?authorApp a crm:E41_Appellation ;
                                 crm:P2_has_type <https://veniss.net/resource/type/appellation> ;
                                 rdfs:label ?_author .
                      FILTER(STR(?_author) != "")
                    }

                    # Location from island appellation
                    OPTIONAL {
                      ?source veniss_ontology:has_island ?islandEntity .
                      ?islandEntity crm:P1_is_identified_by ?islandApp .
                      ?islandApp a crm:E41_Appellation ;
                                 rdfs:label ?_location .
                      FILTER(STR(?_location) != "")
                    }

                    # Year from production time-span
                    OPTIONAL {
                      ?source crm:P108i_was_produced_by ?prod2 .
                      ?prod2 crm:P4_has_time-span ?timeSpan .
                      ?timeSpan crm:P170i_time_is_defined_by ?yearPrimitive .
                      ?yearPrimitive crm:P2_has_type <https://veniss.net/resource/type/time_primitive_year> ;
                                     rdfs:label ?_year .
                    }

                    # Thumbnail from main representation via IIIF
                    OPTIONAL {
                      ?source <http://www.researchspace.org/ontology/PX_has_main_representation> ?imgEntity .
                      ?imgEntity crm:P1_is_identified_by ?imgFile .
                      ?imgFile <http://www.researchspace.org/ontology/PX_has_file_name> ?fileName .
                      BIND(CONCAT("/proxy/IIIF/", ?fileName, "/full/!200,200/0/default.jpg") AS ?_thumbnail)
                    }

                    # Level from historical map tab
                    OPTIONAL { ?source veniss_ontology:has_historical_map_level ?_level }
                }
                GROUP BY ?url
            '
            map-options='{"crs":"EPSG:3857", "extent": [1358358.959761288, 5681238.026850056, 1385414.0522355612, 5705635.9345880805]}'
            fix-zoom-level="12"
            fix-center="[1370000.000000000, 5692800.000000000]"
            default-features-color="#9b0014"
            tuple-template="{{> details }}">

            <template id="details">
                <div style="font-family: 'Source Sans Pro', 'Lato', sans-serif; min-width: 180px; max-width: 240px;">
                    <div style="font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 600; color: #222; margin: 0 0 6px 0; padding-bottom: 5px; border-bottom: 2px solid var(--archipelago-gold, #d4b87a); line-height: 1.2;">
                        {{name.value}}
                    </div>
                    <table style="width: 100%; font-size: 12px; line-height: 1.3; border-collapse: collapse;">
                        {{#if label_construction.value}}
                        <tr>
                            <td style="color: #999; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; padding: 2px 8px 2px 0; vertical-align: top; white-space: nowrap;">Built</td>
                            <td style="color: #333; padding: 2px 0;">{{label_construction.value}}</td>
                        </tr>
                        {{/if}}
                        {{#if label_demolition.value}}
                        <tr>
                            <td style="color: #999; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; padding: 2px 8px 2px 0; vertical-align: top; white-space: nowrap;">Demolished</td>
                            <td style="color: #333; padding: 2px 0;">{{label_demolition.value}}</td>
                        </tr>
                        {{/if}}
                        {{#if has_use.value}}
                        <tr>
                            <td style="color: #999; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; padding: 2px 8px 2px 0; vertical-align: top; white-space: nowrap;">Use</td>
                            <td style="color: #333; padding: 2px 0;">{{use.value}} {{#if label_use_bob.value}}<span style="color: #aaa; font-size: 11px;">({{label_use_bob.value}}–{{label_use_eoe.value}})</span>{{/if}}</td>
                        </tr>
                        {{/if}}
                        <tr>
                            <td style="color: #999; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; padding: 2px 8px 2px 0; vertical-align: top; white-space: nowrap;">Phase</td>
                            <td style="color: #333; padding: 2px 0; font-weight: 500;">{{label_bob.value}}–{{label_eoe.value}}</td>
                        </tr>
                    </table>
                    <div style="margin-top: 6px; padding-top: 5px; border-top: 1px solid #eee;">
                        <semantic-link iri="{{#if building_iri.value}}{{building_iri.value}}{{else}}{{subject.value}}{{/if}}" style="font-size: 12px; color: var(--archipelago-gold, #d4b87a); text-decoration: none; font-weight: 500;">
                            See details →
                        </semantic-link>
                        {{#if building_iri.value}}
                        <br/>
                        <semantic-link 
                            iri="http://www.researchspace.org/resource/ThinkingFrames"
                            urlqueryparam-view="resource-editor"
                            urlqueryparam-resource="{{building_iri.value}}"
                            style="font-size: 12px; color: #396EFE; text-decoration: none; font-weight: 500;">
                            Open in editor ✎
                        </semantic-link>
                        {{/if}}
                    </div>
                </div>
            </template>

            <!-- FEATURES LAYERS (vector data from SPARQL queries) -->
            
            <!-- Buildings Layer - Federated query: SQL geosql for geometry + triplestore for temporal data -->
            <features-layer
                identifier="buildings"
                name="Buildings"
                type="geometry"
                z-index="3"
                fill-opacity="0.55"
                stroke-opacity="0.9"
                query="
                    PREFIX crm: <http://www.cidoc-crm.org/cidoc-crm/>
                    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
                    PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
                    PREFIX xsd: <http://www.w3.org/2001/XMLSchema#>
                    PREFIX veniss_sql: <http://www.researchspace.org/resource/system/service/veniss_sql#>
                    PREFIX rs_sql_sail: <http://www.researchspace.org/resource/system/sql#>

                    SELECT DISTINCT ?subject ?wkt ?bw_id ?t ?z ?bob ?eoe ?use ?name ?label_bob ?label_eoe ?building_iri ?label_construction ?label_demolition ?label_use_bob ?label_use_eoe ?has_use WHERE {
                        # Get geometry from SQL service
                        SERVICE <http://www.researchspace.org/resource/system/repository/federation#geosql> {
                            ?root rs_sql_sail:hasQueryId 'production';
                                veniss_sql:minX '1358358';
                                veniss_sql:minY '5681238';
                                veniss_sql:maxX '1385414';
                                veniss_sql:maxY '5705635';
                                veniss_sql:wkt ?wkt;
                                veniss_sql:bw_id ?bw_id;
                                veniss_sql:t ?t;
                                veniss_sql:z ?z.
                        }
                        
                        # Join with triplestore for temporal data
                        ?phase crm:P4_has_time-span ?timespan;
                            crm:P138i_has_representation ?2drepresentation.
                        ?2drepresentation rdfs:label ?bw_id.
                        ?physical_changes crm:P166i_had_presence ?phase.
                        ?building_iri crm:P196i_is_defined_by ?physical_changes.
                        
                        # Extract building time span (with fallbacks for missing dates)
                        OPTIONAL { ?timespan crm:P82a_begin_of_the_begin ?phase_bob_0. }
                        OPTIONAL { ?timespan crm:P82b_end_of_the_end ?phase_eoe_0. }
                        BIND(COALESCE(?phase_bob_0, '0001-01-01'^^xsd:date) AS ?phase_bob)
                        BIND(IF(BOUND(?phase_eoe_0), ?phase_eoe_0, STRDT(STR(NOW()), xsd:date)) AS ?phase_eoe)
                        
                        # Extract usage info and time span
                        OPTIONAL {
                            ?building_iri crm:P16i_was_used_for ?useNode.
                            ?useNode crm:P2_has_type ?useType.
                            ?useType rdfs:label ?useTypeLabel;
                                skos:broader ?parent.
                            ?parent rdfs:label ?parentLabel.
                            FILTER((LANG(?useTypeLabel)) = 'en')
                            FILTER((LCASE(STR(?parentLabel))) = 'use')
                            OPTIONAL { ?useNode crm:P4_has_time-span ?useTimeSpan. }
                            OPTIONAL { ?useTimeSpan crm:P82a_begin_of_the_begin ?useNode_bob_0. }
                            OPTIONAL { ?useTimeSpan crm:P82b_end_of_the_end ?useNode_eoe_0. }
                        }
                        BIND(?useNode_bob_0 AS ?useNode_bob)
                        BIND(IF(BOUND(?useNode_eoe_0), ?useNode_eoe_0, STRDT(STR(NOW()), xsd:date)) AS ?useNode_eoe)
                        
                        # Compute final intersection: bob, eoe
                        BIND(IF((BOUND(?phase_bob)) && (BOUND(?useNode_bob)), IF(?phase_bob > ?useNode_bob, ?phase_bob, ?useNode_bob), COALESCE(?phase_bob, ?useNode_bob)) AS ?bob)
                        BIND(IF((BOUND(?phase_eoe)) && (BOUND(?useNode_eoe)), IF(?phase_eoe < ?useNode_eoe, ?phase_eoe, ?useNode_eoe), COALESCE(?phase_eoe, ?useNode_eoe)) AS ?eoe)
                        
                        # Filter out invalid intervals
                        FILTER(?bob < ?eoe)
                        
                        # Labeling
                        BIND(COALESCE(?useTypeLabel, 'Unknown') AS ?use)
                        BIND(STRBEFORE(STR(?bob), '-') AS ?label_bob)
                        BIND(STRBEFORE(STR(?eoe), '-') AS ?label_eoe)
                        ?building_iri rdfs:label ?name_full.
                        BIND(?name_full AS ?name)
                        
                        # Physical phase dates (construction / demolition)
                        BIND(IF(BOUND(?phase_bob_0), STRBEFORE(STR(?phase_bob_0), '-'), '') AS ?label_construction)
                        BIND(IF(BOUND(?phase_eoe_0), STRBEFORE(STR(?phase_eoe_0), '-'), '') AS ?label_demolition)
                        
                        # Use dates
                        BIND(IF(BOUND(?useNode_bob_0), STRBEFORE(STR(?useNode_bob_0), '-'), '') AS ?label_use_bob)
                        BIND(IF(BOUND(?useNode_eoe_0), STRBEFORE(STR(?useNode_eoe_0), '-'), '') AS ?label_use_eoe)
                        
                        # Flag: is there a known use?
                        BIND(IF(BOUND(?useTypeLabel), 'true', '') AS ?has_use)
                        
                        # Create unique subject per phase x use combination
                        # Each temporal slice needs its own feature ID for OpenLayers
                        BIND(IRI(CONCAT(STR(?building_iri), '#', STR(?bw_id), '_', ENCODE_FOR_URI(COALESCE(?useTypeLabel, 'Unknown')))) AS ?subject)
                    }
                    ORDER BY DESC(?subject)
                    LIMIT 2000"
                visible="true"
                opacity="1">
            </features-layer>

            <!-- Islands Layer - UNIFIED query with proper phase duration calculation -->
            <!-- Uses islands_all_temporal with LEAD() window function for eoe = next_bob - 1 -->
            <!-- Returns 26 island records from 5 locations: CRT, LZV, MDM, SSC, SSV -->
            <features-layer
                identifier="islands"
                name="Islands"
                type="geometry"
                z-index="2"
                fill-opacity="0.08"
                stroke-opacity="0.7"
                query="
                    PREFIX veniss_sql: <http://www.researchspace.org/resource/system/service/veniss_sql#>
                    PREFIX rs_sql_sail: <http://www.researchspace.org/resource/system/sql#>

                    SELECT ?bw_id ?wkt ?bob ?eoe 
                           (IRI(CONCAT('http://veniss.net/resource/', ?bw_id)) AS ?subject)
                           (?t AS ?type)
                           (?z AS ?zIndex)
                           (?bob AS ?label_bob)
                           (?eoe AS ?label_eoe)
                           ('Island' AS ?name)
                           ('Unknown' AS ?use)
                    WHERE {
                        SERVICE <http://www.researchspace.org/resource/system/repository/federation#geosql> {
                            ?r rs_sql_sail:hasQueryId 'islands_all_temporal' .
                            ?r veniss_sql:bw_id ?bw_id .
                            ?r veniss_sql:wkt ?wkt .
                            ?r veniss_sql:t ?t .
                            ?r veniss_sql:z ?z .
                            ?r veniss_sql:bob ?bob .
                            ?r veniss_sql:eoe ?eoe .
                        }
                    }"
                visible="true"
                opacity="1">
            </features-layer>

            <!-- BASEMAP TILES LAYERS (static) -->
            <tiles-layer
                thumbnail='/assets/images/basemaps_thumbnails_light.jpg'
                url='/proxy/mapbox/styles/v1/mapbox/light-v10/tiles/256/{z}/{x}/{y}'
                identifier='light'
                name='Light'
                level='basemap'
                author=""
                location=""
                year="">
            </tiles-layer>

            <tiles-layer
                thumbnail='/assets/images/basemaps_thumbnails_waterways.jpg'
                url='/proxy/mapbox/styles/v1/digitatti/cmdftb9m8016d01s960br0vka/tiles/256/{z}/{x}/{y}'
                identifier='waterways'
                name='Waterways'
                level='basemap'
                author=""
                location=""
                year="">
            </tiles-layer>

            <tiles-layer
                thumbnail='/assets/images/groad.jpg'
                url='https://mt0.google.com/vt/lyrs=r&hl=en&x={x}&y={y}&z={z}'
                identifier='GRoadmap'
                name='Google Roadmap'
                level='basemap'
                author="Google"
                location=""
                year="2023">
            </tiles-layer>

            <tiles-layer
                thumbnail='/assets/images/gsatellite.jpg'
                url='https://mt0.google.com/vt/lyrs=s&hl=en&x={x}&y={y}&z={z}'
                identifier='GSatellite'
                name='Google Satellite'
                level='basemap'
                author="Google"
                location=""
                year="2023">
            </tiles-layer>

            <tiles-layer
                thumbnail='/assets/images/ghybrid.jpg'
                url='https://mt0.google.com/vt/lyrs=y&hl=en&x={x}&y={y}&z={z}'
                identifier='GHybrid'
                name='Google Hybrid'
                level='basemap'
                author="Google"
                location=""
                year="2023">
            </tiles-layer>

            <tiles-layer
                thumbnail='/assets/images/basemaps_thumbnails_ortofoto.jpg'
                url='https://geoportale.comune.venezia.it/Geocortex/Essentials/REST/local-proxy/GeoPortale/11/RasterDataset_2014_2/MapServer/tile/{z}/{y}/{x}'
                identifier='ortofoto_geoportale'
                name='Ortofoto Geoportale'
                level='basemap'
                author="Comune di Venezia"
                location=""
                year="2022">
            </tiles-layer>
    </semantic-map-advanced>
</div>

<!-- NOTE: Buildings query uses federated approach:
     1. SQL geosql service for WKT geometry via 'production' queryId
     2. Triplestore join via bw_id for CIDOC-CRM temporal data
     3. Computes temporal intersection of building phase and usage
-->
