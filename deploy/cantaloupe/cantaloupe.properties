# Cantaloupe configuration for VeNiss IIIF serving (Cantaloupe 5.x)
# Replaces Digilib. The RS platform proxies /proxy/IIIF/{id}/... to this server's
# /iiif/2/{id}/... endpoint (see config/proxy.prop). The IIIF {id} is the bare
# filename stored in rso:PX_has_file_name (flat layout, no subdirectories).

# ---- HTTP ----
http.enabled = true
http.host = 0.0.0.0
http.port = 8182
https.enabled = false

# ---- IIIF endpoints ----
endpoint.iiif.2.enabled = true
endpoint.iiif.3.enabled = true

# ---- Source: filesystem ----
# Images are mounted read-only at /imageroot (must point at the SAME directory
# Digilib used: <imageStorageRoot>/file == runtime-data/images/file).
source.static = FilesystemSource
FilesystemSource.lookup_strategy = BasicLookupStrategy
FilesystemSource.BasicLookupStrategy.path_prefix = /imageroot/
FilesystemSource.BasicLookupStrategy.path_suffix =

# ---- Processor ----
# Java2dProcessor handles JPEG/PNG/GIF and TIFF/BigTIFF (bundled ImageIO plugins),
# decoding tiled/pyramidal TIFF efficiently for region/size requests.
processor.selection_strategy = ManualSelectionStrategy
processor.ManualSelectionStrategy.fallback = Java2dProcessor

# ---- Large images ----
# Cantaloupe streams/tiles rather than decoding whole images to RAM (unlike Digilib).
# 0 = no output-pixel cap; set a number to bound very large outputs if desired.
max_pixels = 0

# ---- Caching (big win for large/TIFF sources) ----
cache.server.derivative.enabled = true
cache.server.derivative = FilesystemCache
cache.server.info.enabled = true
FilesystemCache.pathname = /var/cache/cantaloupe
FilesystemCache.ttl_seconds = 2592000

# ---- Logging ----
log.application.level = warn
